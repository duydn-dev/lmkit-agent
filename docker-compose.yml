services:
  api:
    build:
      context: .
      dockerfile: LmKitOmniApi/Dockerfile
    ports:
      - "5032:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - PostgreSql=Server=postgres;Port=5432;Database=LmKitAgent;Username=postgres;Password=${POSTGRES_PASSWORD};
      - VectorStore__BaseUrl=http://qdrant:6334
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - Cors__AllowedOrigins__0=${CORS_ORIGIN:-http://localhost:5173}
      - ConnectionStrings__Redis=${REDIS_CONNECTION_STRING:-redis:6379}
      - TelegramSettings__BotToken=${TELEGRAM_BOT_TOKEN}
      - TelegramSettings__ChatId=${TELEGRAM_CHAT_ID}
      - GraphDb__Uri=bolt://neo4j:7687
      - GraphDb__Username=neo4j
      - GraphDb__Password=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=LmKitAgent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20.0
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${POSTGRES_PASSWORD}
    volumes:
      - neo4jdata:/data
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    command: --dev
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    restart: unless-stopped

  client:
    build:
      context: LmKitOmniClient
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  qdrantdata:
  neo4jdata:
